name: Build Tamoda Extension

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4 # <-- Sudah di-update ke v4

    - name: Setup Java JDK 8
      uses: actions/setup-java@v4 # <-- Sudah di-update ke v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Build Extension pakai Apache Ant
      run: ant extension

    - name: Ambil File AIX (Upload Artifact)
      uses: actions/upload-artifact@v4 # <-- INI BIANG KEROKNYA, Sudah di-update ke v4
      with:
        name: TamodaLauncher-Extension
        path: out/*.aix
